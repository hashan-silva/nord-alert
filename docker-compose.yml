services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nord-alert-backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_BASE_URL: http://localhost:8080
        REACT_APP_BACKEND_VERSION: ${BACKEND_VERSION:-1.0.0}
    container_name: nord-alert-web
    depends_on:
      - backend
    ports:
      - "3000:8080"
