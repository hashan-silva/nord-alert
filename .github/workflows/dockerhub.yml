name: Publish Docker Hub Images

permissions:
  contents: read

on:
  push:
    branches: [ main, 'v*' ]
    paths:
      - 'backend/**'
      - 'web/**'
      - 'terraform/**'
      - '.github/workflows/dockerhub.yml'
      - 'backend/Dockerfile'
      - 'web/Dockerfile'

concurrency:
  group: dockerhub-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-images:
    runs-on: ubuntu-latest
    env:
      BACKEND_IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/nord-alert-backend
      WEB_IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/nord-alert-web
      WEB_BACKEND_BASE_URL: ${{ vars.WEB_BACKEND_BASE_URL || 'http://localhost:8080' }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect image changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet "$BASE" "$HEAD" -- backend terraform; then
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          fi

          if git diff --quiet "$BASE" "$HEAD" -- web terraform; then
            echo "web_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "web_changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          BASE: ${{ github.event.before }}
          HEAD: ${{ github.sha }}

      - name: Set up Docker Buildx
        if: steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.web_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.web_changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            {
              echo "backend_tags<<EOF"
              echo "${BACKEND_IMAGE_REPO}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            {
              echo "web_tags<<EOF"
              echo "${WEB_IMAGE_REPO}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == v* ]]; then
            {
              echo "backend_tags<<EOF"
              echo "${BACKEND_IMAGE_REPO}:${GITHUB_REF_NAME}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            {
              echo "web_tags<<EOF"
              echo "${WEB_IMAGE_REPO}:${GITHUB_REF_NAME}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch for Docker Hub tagging: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Build and push backend image
        if: steps.changes.outputs.backend_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.backend_tags }}
          cache-to: type=gha,mode=max

      - name: Build and push web image
        if: steps.changes.outputs.web_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            REACT_APP_BACKEND_BASE_URL=${{ env.WEB_BACKEND_BASE_URL }}
          tags: ${{ steps.tags.outputs.web_tags }}
          cache-to: type=gha,mode=max
