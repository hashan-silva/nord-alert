name: Build and Deploy Platform

permissions:
  contents: read

on:
  push:
    branches: [ main, 'v*' ]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'eu-north-1' }}
      ECR_REPOSITORY: nord-alert-backend
      SES_SENDER_EMAIL: ${{ vars.SES_SENDER_EMAIL || secrets.SES_SENDER_EMAIL }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute Terraform workspace from branch
        id: ws
        shell: bash
        run: |
          SAFE=$(echo "${GITHUB_REF_NAME}" | sed -E 's/[^A-Za-z0-9_-]+/-/g')
          echo "name=${SAFE}" >> "$GITHUB_OUTPUT"

      - name: Detect backend changes
        id: backend_changed
        shell: bash
        run: |
          if git diff --quiet "$BASE" "$HEAD" -- backend terraform; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          BASE: ${{ github.event.before }}
          HEAD: ${{ github.sha }}

      - name: Detect frontend changes
        id: frontend_changed
        shell: bash
        run: |
          if git diff --quiet "$BASE" "$HEAD" -- web terraform; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          BASE: ${{ github.event.before }}
          HEAD: ${{ github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS account and image URIs
        id: aws
        shell: bash
        run: |
          ECR_TAG="${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          FUNCTION_NAME="nord-alert-${{ steps.ws.outputs.name }}-backend"
          if [ "${{ steps.backend_changed.outputs.changed }}" = "true" ]; then
            LAMBDA_IMAGE_URI="${ECR_IMAGE}:${ECR_TAG}"
          else
            LAMBDA_IMAGE_URI=$(aws lambda get-function \
              --function-name "${FUNCTION_NAME}" \
              --query 'Code.ImageUri' \
              --output text)
          fi
          echo "ecr_tag=${ECR_TAG}" >> "$GITHUB_OUTPUT"
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "ecr_image=${ECR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "lambda_image_uri=${LAMBDA_IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Write Terraform variables file (ci.auto.tfvars)
        shell: bash
        working-directory: terraform
        run: |
          cat > ci.auto.tfvars <<EOF
          aws_region          = "${{ env.AWS_REGION }}"
          ecr_repository_name = "${{ env.ECR_REPOSITORY }}"
          lambda_image_uri    = "${{ steps.aws.outputs.lambda_image_uri }}"
          ses_sender_email    = "${{ env.SES_SENDER_EMAIL }}"
          workspace_name      = "${{ steps.ws.outputs.name }}"
          EOF

      - name: Terraform Init (Terraform Cloud Remote Backend)
        working-directory: terraform
        env:
          TF_WORKSPACE: ${{ steps.ws.outputs.name }}
        run: terraform init -input=false

      - name: Apply ECR lifecycle policy
        working-directory: terraform
        env:
          TF_WORKSPACE: ${{ steps.ws.outputs.name }}
        run: terraform apply -target=aws_ecr_lifecycle_policy.lambda -auto-approve

      - name: Set up Docker Buildx
        if: steps.backend_changed.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Amazon ECR
        if: steps.backend_changed.outputs.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Lambda image
        if: steps.backend_changed.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.lambda
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.aws.outputs.ecr_image }}:${{ steps.aws.outputs.ecr_tag }}
          cache-to: type=gha,mode=max

      - name: Terraform Apply
        id: tf_apply
        working-directory: terraform
        env:
          TF_WORKSPACE: ${{ steps.ws.outputs.name }}
        run: terraform apply -auto-approve

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: terraform
        env:
          TF_WORKSPACE: ${{ steps.ws.outputs.name }}
        run: |
          echo "api_url=$(terraform output -raw api_url)" >> "$GITHUB_OUTPUT"
          echo "web_bucket_name=$(terraform output -raw web_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "web_distribution_id=$(terraform output -raw web_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "web_distribution_domain_name=$(terraform output -raw web_distribution_domain_name)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.frontend_changed.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install web dependencies
        if: steps.frontend_changed.outputs.changed == 'true'
        working-directory: web
        run: npm install

      - name: Build web dashboard
        if: steps.frontend_changed.outputs.changed == 'true'
        working-directory: web
        env:
          REACT_APP_BACKEND_BASE_URL: ${{ steps.tf_outputs.outputs.api_url }}
        run: npm run build

      - name: Upload web dashboard to S3
        if: steps.frontend_changed.outputs.changed == 'true'
        run: aws s3 sync web/dist "s3://${{ steps.tf_outputs.outputs.web_bucket_name }}" --delete

      - name: Disable cache for index.html
        if: steps.frontend_changed.outputs.changed == 'true'
        run: |
          aws s3 cp web/dist/index.html \
            "s3://${{ steps.tf_outputs.outputs.web_bucket_name }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        if: steps.frontend_changed.outputs.changed == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf_outputs.outputs.web_distribution_id }}" \
            --paths "/*"
