name: Build and Deploy Backend

permissions:
  contents: read

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/nord-alert-backend
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: nord-alert-backend
    steps:
      - uses: actions/checkout@v4

      - name: Compute Terraform workspace from branch
        id: ws
        shell: bash
        run: |
          SAFE=$(echo "${GITHUB_REF_NAME}" | sed -E 's/[^A-Za-z0-9_-]+/-/g')
          echo "name=${SAFE}" >> "$GITHUB_OUTPUT"

      - name: Detect backend changes
        id: backend_changed
        shell: bash
        run: |
          if git diff --quiet "$BASE" "$HEAD" -- backend; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          BASE: ${{ github.event.before }}
          HEAD: ${{ github.sha }}

      - name: Compute image tag
        id: img
        shell: bash
        run: |
          if [ "${{ steps.backend_changed.outputs.changed }}" = "true" ]; then
            echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS account and image URIs
        id: aws
        shell: bash
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "ecr_image=${ECR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "lambda_image_uri=${ECR_IMAGE}:${{ steps.img.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Write Terraform variables file (ci.auto.tfvars)
        shell: bash
        working-directory: terraform
        run: |
          cat > ci.auto.tfvars <<EOF
          aws_region          = "${{ env.AWS_REGION }}"
          ecr_repository_name = "${{ env.ECR_REPOSITORY }}"
          lambda_image_uri    = "${{ steps.aws.outputs.lambda_image_uri }}"
          workspace_name      = "${{ steps.ws.outputs.name }}"
          EOF

      - name: Terraform Init (Terraform Cloud Remote Backend)
        working-directory: terraform
        env:
          TF_WORKSPACE: ${{ steps.ws.outputs.name }}
        run: terraform init -input=false -reconfigure

      - name: Ensure ECR repository exists
        working-directory: terraform
        env:
          TF_WORKSPACE: ${{ steps.ws.outputs.name }}
        run: terraform apply -target=aws_ecr_repository.lambda -auto-approve

      - name: Set up Docker Buildx
        if: steps.backend_changed.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.backend_changed.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Amazon ECR
        if: steps.backend_changed.outputs.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker Hub image
        if: steps.backend_changed.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ steps.img.outputs.tag }}
          cache-to: type=gha,mode=max

      - name: Build and push Lambda image
        if: steps.backend_changed.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.lambda
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.aws.outputs.ecr_image }}:latest
            ${{ steps.aws.outputs.ecr_image }}:${{ steps.img.outputs.tag }}
          cache-to: type=gha,mode=max

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_WORKSPACE: ${{ steps.ws.outputs.name }}
        run: terraform apply -auto-approve

